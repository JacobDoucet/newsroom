version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: newsroom
      POSTGRES_USER: newsroom
      POSTGRES_PASSWORD: newsroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsroom"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://newsroom:newsroom@db:5432/newsroom?sslmode=disable
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      LLM_API_KEY: local-dev
      LLM_MODEL: local-model-name
      MEDIA_DIR: /data/media
    volumes:
      - media_data:/data/media
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8080/api
    depends_on:
      - api

volumes:
  postgres_data:
  media_data:
